<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <title>Contact Us - Best Dealership</title>
    <style>
        .contact-card { max-width: 600px; margin: auto; margin-top: 50px; }
        .contact-icon { font-size: 2rem; color: #0d6efd; }
    </style>
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">Best Dealership</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="/about/">About Us</a></li>
                    <li class="nav-item"><a class="nav-link active" href="/contact/">Contact Us</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="card shadow contact-card">
            <img src="https://images.unsplash.com/photo-1423666639041-f56000c27a9a?auto=format&fit=crop&w=600&q=80" class="card-img-top" alt="Contact Us">
            <div class="card-body text-center">
                <h2 class="card-title mb-4">Get In Touch</h2>
                <p class="card-text">We are here to help you find your dream car. Contact our support team 24/7.</p>
                
                <hr>
                
                <div class="mb-3">
                    <p><strong>📍 Address:</strong> 123 Car Street, Tech City, Palestine</p>
                </div>
                <div class="mb-3">
                    <p><strong>📞 Phone:</strong> +970 599 661 819</p>
                </div>
                <div class="mb-3">
                    <p><strong>📧 Email:</strong> support@bestdealership.com</p>
                </div>

                <div class="mt-4">
                    <button class="btn btn-primary w-100">Send us a Message</button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
